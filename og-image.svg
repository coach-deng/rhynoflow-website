<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e676;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#e0e0e0" stroke-width="1" />
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#e0e0e0" stroke-width="1" />
  <line x1="400" y1="0" x2="400" y2="630" stroke="#e0e0e0" stroke-width="1" />
  <line x1="800" y1="0" x2="800" y2="630" stroke="#e0e0e0" stroke-width="1" />

  <!-- Green accent bar left -->
  <rect x="80" y="180" width="6" height="120" fill="url(#greenGrad)" rx="3" />

  <!-- Logo text -->
  <text x="108" y="228" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" fill="#1a1a1a" letter-spacing="-2">Rhyno</text>
  <text x="108" y="228" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="-2">
    <tspan fill="#1a1a1a">Rhyno</tspan><tspan fill="url(#greenGrad)">flow</tspan>
  </text>

  <!-- Tagline -->
  <text x="108" y="278" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="500" fill="#666">Your admin, charged through.</text>

  <!-- Divider -->
  <rect x="80" y="320" width="500" height="2" fill="#e0e0e0" />

  <!-- Value prop line -->
  <text x="80" y="380" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="600" fill="#1a1a1a">Custom software &amp; automation for Copenhagen businesses.</text>
  <text x="80" y="415" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" fill="#666">Web apps · Google Workspace · AI tools · Foreninger</text>

  <!-- URL badge -->
  <rect x="80" y="460" width="220" height="44" fill="#1a1a1a" rx="8" />
  <text x="190" y="488" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">rhynoflow.com</text>

  <!-- Right side decoration - stat cards -->
  <rect x="820" y="140" width="300" height="100" fill="#ffffff" rx="12" stroke="#e0e0e0" stroke-width="1.5" />
  <text x="970" y="185" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#1a1a1a" text-anchor="middle">20h+</text>
  <text x="970" y="218" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#666" text-anchor="middle">saved per week</text>

  <rect x="820" y="265" width="300" height="100" fill="#ffffff" rx="12" stroke="#e0e0e0" stroke-width="1.5" />
  <text x="970" y="310" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#1a1a1a" text-anchor="middle">5 days</text>
  <text x="970" y="343" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#666" text-anchor="middle">average delivery</text>

  <rect x="820" y="390" width="300" height="100" fill="#ffffff" rx="12" stroke="#e0e0e0" stroke-width="1.5" />
  <text x="970" y="435" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#1a1a1a" text-anchor="middle">0 kr</text>
  <text x="970" y="468" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="500" fill="#666" text-anchor="middle">new software to install</text>

  <!-- Green dot accent top right -->
  <circle cx="1140" cy="80" r="40" fill="#00c853" opacity="0.12" />
  <circle cx="1140" cy="80" r="20" fill="#00c853" opacity="0.2" />
  <circle cx="1140" cy="80" r="8" fill="#00c853" />
</svg>
