<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Rhynoflow — Your admin, charged through.</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="./assets/logo-mark-green.svg"/>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="dns-prefetch" href="https://unpkg.com">
<link rel="stylesheet" href="./colors_and_type.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; }
  * { box-sizing: border-box; }
  /* LCP/CLS: reserve hero space so page doesn't shift on React mount */
  #root:empty::before {
    content: '';
    display: block;
    min-height: 100vh;
    background: #fafafa;
  }
  ::selection { background: #00c853; color: #0a0a0a; }

  /* Range input styling — green accent thumb, 4px track */
  input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px; background: #e5e5e5; border-radius: 999px;
  }
  input[type=range]::-moz-range-track {
    height: 4px; background: #e5e5e5; border-radius: 999px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 999px;
    background: #00c853; border: 3px solid #ffffff;
    box-shadow: 0 1px 3px rgba(10,10,10,0.18);
    margin-top: -7px; cursor: grab;
    transition: transform 150ms cubic-bezier(0.2,0,0,1);
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 999px;
    background: #00c853; border: 3px solid #ffffff;
    box-shadow: 0 1px 3px rgba(10,10,10,0.18);
    cursor: grab;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="./Nav.jsx"></script>
  <script type="text/babel" src="./Hero.jsx"></script>
  <script type="text/babel" src="./StatusStrip.jsx"></script>
  <script type="text/babel" src="./ProofStrip.jsx"></script>
  <script type="text/babel" src="./AgentPipeline.jsx"></script>
  <script type="text/babel" src="./LiveDemo.jsx"></script>
  <script type="text/babel" src="./BriefingSimulator.jsx"></script>
  <script type="text/babel" src="./RoiSlider.jsx"></script>
  <script type="text/babel" src="./Pricing.jsx"></script>
  <script type="text/babel" src="./Footer.jsx"></script>

  <script type="text/babel">
    function Home() {
      return (
        <>
          <Nav />
          <Hero />
          <StatusStrip />
          <ProofStrip />
          <AgentPipeline />
          <LiveDemo />
          <BriefingSimulator />
          <RoiSlider />
          <Pricing />
          <Footer />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Home />);
  </script>
</body>
</html>
