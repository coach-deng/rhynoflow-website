name: Weekly Site Audit

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday 7 AM UTC (9 AM Copenhagen)
  workflow_dispatch:       # Also run manually anytime

jobs:
  broken-links:
    name: Broken Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --base https://rhynoflow.com
            --exclude 'mailto:'
            --exclude 'tel:'
            --exclude 'cal.com'
            --timeout 20
            '**/*.html'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue if broken links found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔗 Broken links detected — ' + new Date().toISOString().split('T')[0],
              body: 'The weekly link checker found broken links on rhynoflow.com.\n\nCheck the [Actions run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.',
              labels: ['bug', 'automated']
            })

  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse on key pages
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://rhynoflow.com
            https://rhynoflow.com/for-revisorer
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1

      - name: Create issue if scores are low
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚡ Low Lighthouse score detected — ' + new Date().toISOString().split('T')[0],
              body: 'Weekly Lighthouse audit found performance issues on rhynoflow.com.\n\nCheck the [Actions run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for the full report.',
              labels: ['performance', 'automated']
            })
